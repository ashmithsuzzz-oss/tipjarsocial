<!DOCTYPE html>
<html>
<head>
  <title>Minima Feed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="card">

    <h2>💬 Minima Feed</h2>

    <p class="desc">
      Share your message on-chain. Messages stay visible for 24 hours.
    </p>

    <p id="status">Connecting...</p>

    <!-- Message input -->
    <textarea id="id_sendmsg" placeholder="Write your message..."></textarea>

    <button onclick="sendMessage()">Post Message</button>

    <div id="id_list_messages"></div>

    <button onclick="loadMessages()">Refresh Feed</button>

  </div>
</div>

<script src="minimask.js"></script>
<script src="app.js"></script>

</body>
</html>

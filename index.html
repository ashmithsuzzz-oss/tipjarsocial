<!DOCTYPE html>
<html>
<head>
  <title>Minima Super App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TipJar Style -->
  <link rel="stylesheet" href="style.css">

  <!-- Wall extra styles -->
  <link rel="stylesheet" href="wall.css">
</head>

<body>

<div class="container">
  <div class="card">

    <h2 class="title">💸 Minima Super App</h2>

<p class="tagline">
Empower creators with direct Minima tips — simply paste their address and send instantly.
</p>

<p class="subtext">
Make your voice part of the Minima Feed, where messages live on-chain for 24 hours.
</p>

    <!-- NAV -->
    <div style="margin-bottom:15px;">
      <button onclick="showTab('tip')">Tip Jar</button>
      <button onclick="showTab('wall')">Minima Feed</button>
    </div>

    <!-- ================= TIP JAR ================= -->
    <div id="tipTab">

      <p id="status">Connecting...</p>

<!-- ✅ ADDRESS INPUT (ADD HERE) -->
<input id="receiverAddress" placeholder="Paste receiver address">

<!-- Tip buttons -->
<button onclick="sendTip(0.0001)">☕ Tip 0.0001</button>
<button onclick="sendTip(0.001)">🍕 Tip 0.001</button>
<button onclick="sendTip(0.01)">🚀 Tip 0.01</button>

<input id="customAmount" placeholder="Custom amount">
<button class="secondary" onclick="sendCustom()">Send Custom</button>

    </div>

    <!-- ================= WALL ================= -->
    <div id="wallTab" style="display:none;">

      <textarea id="id_sendmsg" placeholder="Write message..."
        style="width:100%;height:100px;"></textarea>

      <button onclick="sendMessage()">Send Message</button>

      <div id="id_list_messages"></div>

      <button onclick="loadMessages()">Refresh</button>

    </div>

  </div>
</div>

<!-- POPUP -->
<div id="successPopup" class="popup hidden">
  <div class="popup-box">
    <h2>🎉</h2>
    <p>Success!</p>
  </div>
</div>

<!-- Scripts -->
<script src="minimask.js"></script>
<script src="app.js"></script>
<script src="wall.js"></script>

<script>
function showTab(tab){
  document.getElementById("tipTab").style.display = (tab==="tip")?"block":"none";
  document.getElementById("wallTab").style.display = (tab==="wall")?"block":"none";
}
</script>

</body>
</html>
